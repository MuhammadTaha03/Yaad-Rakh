name: yaad_rakh
description: "A new Flutter project."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  provider: ^6.1.2

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Firebase
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  google_sign_in: ^6.2.0
  cloud_firestore: ^5.0.0
  firebase_messaging: ^15.0.0

  # Localization
  easy_localization: ^3.0.7
  intl: ^0.20.2

  # UI & Fonts
  google_fonts: ^6.1.0
  speech_to_text: ^7.4.0
  table_calendar: ^3.1.2

  # Network & System
  connectivity_plus: ^6.0.3
  uuid: ^4.4.0
  meta: ^1.11.0

  # Splash Screen
  flutter_native_splash: ^2.3.10

  # Offline Reminders & Timezones
  flutter_local_notifications: ^17.2.1
  timezone: ^0.9.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.9

flutter:
  uses-material-design: true

  assets:
    - assets/lang/
    - assets/images/

  fonts:
    - family: JameelNooriNastaleeq
      fonts:
        - asset: assets/fonts/JameelNooriNastaleeq.ttf
